<style>
  /* ── March brand palette ──────────────────────────────────────────────── */
  :root {
    --march-base-100:  #0B1F2A;
    --march-base-200:  #0F2A36;
    --march-base-300:  #133847;
    --march-content:   #D6EEF5;
    --march-primary:   #1C5D6F;
    --march-accent:    #6FE3D6;
    --march-secondary: #0F3A4A;
  }

  /* ── Page & sidebar ──────────────────────────────────────────────────── */
  body                        { background-color: #0B1F2A !important; color: #D6EEF5 !important; }
  .side-bar                   { background-color: #0F2A36 !important; border-right: 1px solid #133847 !important; }
  .main                       { background-color: #0B1F2A !important; }
  .main-header                { background-color: #0F2A36 !important; border-bottom: 1px solid #133847 !important; }
  .site-footer                { background-color: #0F2A36 !important; border-top: 1px solid #133847 !important; color: #7aacbe !important; }

  /* ── Navigation ──────────────────────────────────────────────────────── */
  .site-title, .site-title:visited          { color: #D6EEF5 !important; }
  .nav-list .nav-list-link                  { color: #a8ccd8 !important; }
  .nav-list .nav-list-link:hover            { color: #D6EEF5 !important; background-color: #133847 !important; }
  .nav-list .nav-list-link.active           { color: #6FE3D6 !important; background-color: rgba(111,227,214,0.1) !important; font-weight: 600; }
  .nav-category                             { color: #3d6678 !important; border-top-color: #133847 !important; }
  .aux-nav-link, .aux-nav-link:visited      { color: #a8ccd8 !important; }
  .breadcrumb-nav-list-item                 { color: #7fa8ba !important; }
  .page-header                              { border-bottom-color: #133847 !important; }

  /* ── Search ──────────────────────────────────────────────────────────── */
  .search-input                { background-color: #0B1F2A !important; border-color: #133847 !important; color: #D6EEF5 !important; }
  .search-results              { background-color: #0F2A36 !important; border-color: #133847 !important; }
  .search-result               { color: #D6EEF5 !important; border-bottom-color: #133847 !important; }
  .search-result:hover         { background-color: #133847 !important; }

  /* ── Typography ──────────────────────────────────────────────────────── */
  .main-content h1, .main-content h2,
  .main-content h3, .main-content h4,
  .main-content h5, .main-content h6 { color: #E6FCF9 !important; }
  .main-content p, .main-content li  { color: #D6EEF5 !important; }
  .main-content a                     { color: #6FE3D6 !important; }
  .main-content a:hover               { color: #9ff0e8 !important; }
  .main-content hr                    { border-color: #133847 !important; }
  blockquote                          { border-left-color: #1C5D6F !important; color: #a8ccd8 !important; }

  /* ── Tables ───────────────────────────────────────────────────────────── */
  table th, table td          { background-color: #0B1F2A !important; color: #D6EEF5 !important;
                                border-bottom: 1px solid #133847 !important; border-left: 1px solid #133847 !important; }
  table th                    { background-color: #0F2A36 !important; }
  table tr:nth-child(even) td { background-color: #0d2330 !important; }

  /* ── Inline code ─────────────────────────────────────────────────────── */
  code, code.language-plaintext,
  .highlighter-rouge:not(.highlight) { background-color: #0F2A36 !important; color: #6FE3D6 !important;
                                        border: 1px solid #133847 !important; border-radius: 4px; }
  code::before, code::after          { content: none !important; }

  /* ── Code blocks ─────────────────────────────────────────────────────── */
  .highlight, .highlighter-rouge .highlight,
  div.highlighter-rouge,
  pre.highlight                       { background-color: #0B1F2A !important; border: 1px solid #133847 !important; border-radius: 6px; }

  /* Rouge tokens */
  .highlight .c, .highlight .c1, .highlight .cm,
  .highlight .cp, .highlight .cs     { color: #3d6070 !important; font-style: italic; }
  .highlight .k, .highlight .kd, .highlight .kn,
  .highlight .kp, .highlight .kr     { color: #6FE3D6 !important; }
  .highlight .kt                     { color: #CFF7F1 !important; }
  .highlight .s, .highlight .sb, .highlight .sc, .highlight .sd,
  .highlight .s2, .highlight .sh, .highlight .si, .highlight .sx,
  .highlight .sr, .highlight .s1, .highlight .ss { color: #36D399 !important; }
  .highlight .m, .highlight .mf, .highlight .mh,
  .highlight .mi, .highlight .mo, .highlight .il { color: #FBBF24 !important; }
  .highlight .o, .highlight .ow     { color: #3ABFF8 !important; }
  .highlight .nf, .highlight .fm    { color: #6FE3D6 !important; }
  .highlight .nc, .highlight .nn    { color: #CFF7F1 !important; }
  .highlight .nb                    { color: #3ABFF8 !important; }
  .highlight .na                    { color: #36D399 !important; }
  .highlight .err                   { color: #F87272 !important; }
  .highlight .n, .highlight .nx    { color: #D6EEF5 !important; }
  .highlight .p                     { color: #C7DDE5 !important; }
  .highlight .gd                    { color: #F87272 !important; }
  .highlight .gi                    { color: #36D399 !important; }

  /* ── Scrollbar ───────────────────────────────────────────────────────── */
  ::-webkit-scrollbar              { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track        { background: #0B1F2A; }
  ::-webkit-scrollbar-thumb        { background: #133847; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover  { background: #1C5D6F; }
</style>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip-tl">
      <rect x="8" y="8" width="85" height="85" rx="16" ry="16"/>
    </clipPath>
    <clipPath id="clip-tr">
      <rect x="107" y="8" width="85" height="85" rx="16" ry="16"/>
    </clipPath>
    <clipPath id="clip-bl">
      <rect x="8" y="107" width="85" height="85" rx="16" ry="16"/>
    </clipPath>
    <clipPath id="clip-br">
      <rect x="107" y="107" width="85" height="85" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>

  <!-- Top-left tile: dark teal with arcs from bottom-right -->
  <rect x="8" y="8" width="85" height="85" rx="16" ry="16" fill="#0b6e7e"/>
  <g clip-path="url(#clip-tl)">
    <circle cx="93" cy="93" r="68" fill="none" stroke="#0a5f6e" stroke-width="18"/>
    <circle cx="93" cy="93" r="46" fill="none" stroke="#0d7a8c" stroke-width="18"/>
    <circle cx="93" cy="93" r="24" fill="none" stroke="#0e8090" stroke-width="18"/>
  </g>

  <!-- Top-right tile: light cyan with diamond -->
  <rect x="107" y="8" width="85" height="85" rx="16" ry="16" fill="#00d8ec"/>
  <rect x="142" y="34" width="20" height="20" rx="2" ry="2" fill="#0b6e7e" transform="rotate(45 152 44)"/>

  <!-- Bottom-left tile: light cyan with small square -->
  <rect x="8" y="107" width="85" height="85" rx="16" ry="16" fill="#00d8ec"/>
  <rect x="32" y="126" width="26" height="26" rx="2" ry="2" fill="#0b6e7e"/>

  <!-- Bottom-right tile: dark teal with arcs from top-left -->
  <rect x="107" y="107" width="85" height="85" rx="16" ry="16" fill="#0b6e7e"/>
  <g clip-path="url(#clip-br)">
    <circle cx="107" cy="107" r="68" fill="none" stroke="#0a5f6e" stroke-width="18"/>
    <circle cx="107" cy="107" r="46" fill="none" stroke="#0d7a8c" stroke-width="18"/>
    <circle cx="107" cy="107" r="24" fill="none" stroke="#0e8090" stroke-width="18"/>
  </g>

  <!-- Subtle glow overlay on light tiles -->
  <rect x="107" y="8" width="85" height="85" rx="16" ry="16" fill="none" stroke="#00eeff" stroke-width="1" opacity="0.3"/>
  <rect x="8" y="107" width="85" height="85" rx="16" ry="16" fill="none" stroke="#00eeff" stroke-width="1" opacity="0.3"/>
</svg>

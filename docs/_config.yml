title: March Lang
description: A statically-typed functional language in the ML/Elixir tradition, compiled to native code via LLVM.
baseurl: "/march"
url: "https://march-language.github.io"

remote_theme: just-the-docs/just-the-docs

# Site structure
nav_order_default: 99

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Code highlighting
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Navigation
nav_external_links:
  - title: GitHub
    url: https://github.com/march-language/march

# Footer
footer_content: 'March Programming Language.'

# Exclude from build
exclude:
  - "*.ml"
  - "*.mly"
  - "*.mll"
  - Makefile
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - _build/

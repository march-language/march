# .github/workflows/build.yml
name: Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string
        description: "Git ref to build (tag, branch, or SHA)"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
            ocaml-compiler: 5.3.0
          - os: macos-13
            platform: darwin-x86_64
            ocaml-compiler: 5.3.0
          - os: ubuntu-24.04
            platform: linux-x86_64
            ocaml-compiler: 5.3.0
            static: true
          - os: ubuntu-24.04
            platform: linux-aarch64
            ocaml-compiler: 5.3.0
            static: true
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # --- Linux static builds (musl) ---

      - name: Install musl toolchain (Linux)
        if: matrix.static
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Set up QEMU (Linux aarch64 cross)
        if: matrix.cross
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # For aarch64, we build inside Alpine (musl-native) under QEMU.
      # This avoids cross-compilation complexity with OCaml.
      - name: Build in Alpine container (Linux aarch64)
        if: matrix.cross
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.21
          options: >-
            --platform linux/arm64
            -v ${{ github.workspace }}:/work
            -w /work
          run: |
            apk add --no-cache bash opam ocaml build-base git llvm19-dev llvm19 brotli-dev brotli-libs
            # Build blake3 from source (portable C only — no x86 SIMD on aarch64)
            git clone --depth 1 https://github.com/BLAKE3-team/BLAKE3.git /tmp/blake3
            gcc -O2 -shared -fPIC -o /usr/lib/libblake3.so \
              /tmp/blake3/c/blake3.c /tmp/blake3/c/blake3_dispatch.c /tmp/blake3/c/blake3_portable.c
            cp /tmp/blake3/c/blake3.h /usr/include/blake3.h
            opam init --disable-sandboxing --bare -y
            opam switch create 5.3.0 ocaml-base-compiler.5.3.0
            eval $(opam env)
            opam install --deps-only -y .
            dune build --force
            mkdir -p _dist/bin _dist/stdlib
            cp _build/default/bin/main.exe _dist/bin/march
            cp _build/default/forge/bin/main.exe _dist/bin/forge
            cp stdlib/*.march _dist/stdlib/
            cp LICENSE _dist/ 2>/dev/null || true

      # --- macOS and Linux x86_64 native builds ---

      - name: Set up OCaml (native)
        if: "!matrix.cross"
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install system dependencies (native)
        if: "!matrix.cross"
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install blake3 llvm
          else
            sudo apt-get update
            sudo apt-get install -y llvm-dev libbrotli-dev
            # libblake3-dev is not in Ubuntu 24.04; build from source
            git clone --depth 1 https://github.com/BLAKE3-team/BLAKE3.git /tmp/blake3
            cd /tmp/blake3/c
            gcc -O2 -shared -fPIC -o libblake3.so \
              blake3.c blake3_dispatch.c blake3_portable.c \
              blake3_sse2_x86-64_unix.S blake3_sse41_x86-64_unix.S \
              blake3_avx2_x86-64_unix.S blake3_avx512_x86-64_unix.S
            sudo cp libblake3.so /usr/local/lib/libblake3.so
            sudo cp blake3.h /usr/local/include/blake3.h
            sudo ldconfig
          fi

      - name: Install dependencies (native)
        if: "!matrix.cross"
        run: opam install --deps-only -y .

      - name: Build (Linux x86_64)
        if: matrix.static && !matrix.cross
        run: |
          eval $(opam env)
          dune build --force
          mkdir -p _dist/bin _dist/stdlib
          cp _build/default/bin/main.exe _dist/bin/march
          cp _build/default/forge/bin/main.exe _dist/bin/forge
          cp stdlib/*.march _dist/stdlib/
          cp LICENSE _dist/ 2>/dev/null || true

      - name: Build (macOS)
        if: "!matrix.static"
        run: |
          eval $(opam env)
          dune build
          mkdir -p _dist/bin _dist/stdlib
          cp _build/default/bin/main.exe _dist/bin/march
          cp _build/default/forge/bin/main.exe _dist/bin/forge
          cp stdlib/*.march _dist/stdlib/
          cp LICENSE _dist/ 2>/dev/null || true

      # --- Package ---

      - name: Strip binary
        run: |
          if command -v strip &> /dev/null; then
            strip _dist/bin/march || true
            strip _dist/bin/forge || true
          fi

      - name: Package archive
        run: |
          ARCHIVE_NAME="march-${{ inputs.version }}-${{ matrix.platform }}"
          mv _dist "${ARCHIVE_NAME}"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: march-${{ inputs.version }}-${{ matrix.platform }}
          path: march-${{ inputs.version }}-${{ matrix.platform }}.tar.gz

  checksums:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          for f in *.tar.gz; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "sha256:${hash}  ${f}" >> ../march-${{ inputs.version }}-checksums.txt
          done

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: march-${{ inputs.version }}-checksums
          path: march-${{ inputs.version }}-checksums.txt

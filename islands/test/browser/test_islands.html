<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>March Islands — Browser Test Suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { margin-bottom: 12px; font-size: 1.4em; }
    #results { font-family: 'SF Mono', Menlo, monospace; font-size: 13px; line-height: 1.6; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .group { color: #93c5fd; font-weight: bold; margin-top: 10px; }
    #summary { margin-top: 16px; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }
    #summary.all-pass { background: #166534; color: #4ade80; }
    #summary.has-fail { background: #7f1d1d; color: #f87171; }

    /* Island fixtures — hidden from view, used by tests */
    #fixtures { position: absolute; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
  <h1>March Islands — Browser Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- ── Test fixtures ────────────────────────────────────────────── -->
  <div id="fixtures">
    <!-- Fixture: eager counter island -->
    <div data-march-island="Counter"
         data-march-hydrate="eager"
         data-march-state='{"count":0}'>
      <span>0</span>
    </div>

    <!-- Fixture: lazy island (off-screen) -->
    <div data-march-island="LazyWidget"
         data-march-hydrate="lazy"
         data-march-state='{"loaded":false}'>
      <p>Loading...</p>
    </div>

    <!-- Fixture: interaction island -->
    <div data-march-island="Interactive"
         data-march-hydrate="interaction"
         data-march-state='{"active":false}'>
      <button>Click me</button>
    </div>

    <!-- Fixture: idle island -->
    <div data-march-island="IdleWorker"
         data-march-hydrate="idle"
         data-march-state='{"ready":false}'>
      <span>waiting</span>
    </div>

    <!-- Fixture: island with escaped state -->
    <div data-march-island="Escaped"
         data-march-hydrate="eager"
         data-march-state='{"name":"it&#39;s escaped"}'>
      <span>escaped</span>
    </div>

    <!-- Fixture: island with no state -->
    <div data-march-island="NoState"
         data-march-hydrate="eager">
      <span>no state</span>
    </div>

    <!-- Fixture: event binding test -->
    <div data-march-island="EventTest"
         data-march-hydrate="eager"
         data-march-state='{"clicks":0,"value":""}'>
      <span>events</span>
    </div>

    <!-- Fixture: cross-island messaging -->
    <div data-march-island="Sender"
         data-march-hydrate="eager"
         data-march-state='{"sent":false}'>
      <span>sender</span>
    </div>
    <div data-march-island="Receiver"
         data-march-hydrate="eager"
         data-march-state='{"received":"none"}'>
      <span>receiver</span>
    </div>
  </div>

  <!-- ── Test runner ──────────────────────────────────────────────── -->
  <script>
    // Simple test framework
    const results = [];
    let currentGroup = '';

    function group(name) { currentGroup = name; }
    function assert(condition, message) {
      results.push({ group: currentGroup, message, pass: !!condition });
    }
    function assertEqual(actual, expected, message) {
      const pass = actual === expected;
      results.push({
        group: currentGroup,
        message: pass ? message : `${message} — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`,
        pass,
      });
    }

    function renderResults() {
      const el = document.getElementById('results');
      const summary = document.getElementById('summary');
      let html = '';
      let lastGroup = '';
      let passed = 0, failed = 0;

      for (const r of results) {
        if (r.group !== lastGroup) {
          html += `<div class="group">${r.group}</div>`;
          lastGroup = r.group;
        }
        if (r.pass) {
          passed++;
          html += `<div class="pass">  \u2713 ${r.message}</div>`;
        } else {
          failed++;
          html += `<div class="fail">  \u2717 ${r.message}</div>`;
        }
      }

      el.innerHTML = html;
      summary.className = failed === 0 ? 'all-pass' : 'has-fail';
      summary.textContent = failed === 0
        ? `All ${passed} tests passed`
        : `${passed} passed, ${failed} failed`;
    }

    // ── Mock WASM modules ──────────────────────────────────────────

    const mockModules = {
      Counter: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="count">${s.count}</span><button data-on-click="Increment">+</button>`;
        },
        update(stateJson, msgJson) {
          const s = JSON.parse(stateJson);
          const m = JSON.parse(msgJson);
          if (m.tag === 'Increment') s.count++;
          if (m.tag === '__init__') { /* keep state */ }
          return JSON.stringify(s);
        },
      },

      Escaped: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="name">${s.name}</span>`;
        },
        update(stateJson) { return stateJson; },
      },

      NoState: {
        render(stateJson) {
          return `<span class="state">${stateJson}</span>`;
        },
        update(stateJson) { return stateJson; },
      },

      EventTest: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="clicks">${s.clicks}</span>`
               + `<button data-on-click="Click">click</button>`
               + `<input data-on-input="Type" value="">`
               + `<form data-on-submit="Submit"><button type="submit">go</button></form>`;
        },
        update(stateJson, msgJson) {
          const s = JSON.parse(stateJson);
          const m = JSON.parse(msgJson);
          if (m.tag === 'Click') s.clicks++;
          if (m.tag === 'Type') s.value = m.value;
          if (m.tag === 'Submit') s.submitted = true;
          return JSON.stringify(s);
        },
      },

      Sender: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="sent">${s.sent}</span>`;
        },
        update(stateJson, msgJson) {
          const s = JSON.parse(stateJson);
          const m = JSON.parse(msgJson);
          if (m.tag === 'DoSend') s.sent = true;
          return JSON.stringify(s);
        },
      },

      Receiver: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="received">${s.received}</span>`;
        },
        update(stateJson, msgJson) {
          const s = JSON.parse(stateJson);
          const m = JSON.parse(msgJson);
          if (m.tag === 'Ping') s.received = 'pong';
          return JSON.stringify(s);
        },
      },

      LazyWidget: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="loaded">${s.loaded}</span>`;
        },
        update(stateJson) { return stateJson; },
      },

      Interactive: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="active">${s.active}</span>`;
        },
        update(stateJson, msgJson) {
          const s = JSON.parse(stateJson);
          s.active = true;
          return JSON.stringify(s);
        },
      },

      IdleWorker: {
        render(stateJson) {
          const s = JSON.parse(stateJson);
          return `<span class="ready">${s.ready}</span>`;
        },
        update(stateJson) { return stateJson; },
      },
    };

    // Install mock WASM loader BEFORE the runtime script loads
    window.__marchTestLoader = async function(baseUrl, name) {
      return mockModules[name] ?? null;
    };
  </script>

  <!-- Load the runtime (uses mock loader above) -->
  <script src="../../runtime/march_islands.js" data-march-base="/test"></script>

  <!-- ── Tests (run after a microtask to let hydration complete) ── -->
  <script>
    async function runTests() {
      // Give the runtime time to hydrate all eager islands.
      // Hydration is async (loadWasmModule returns a promise), and actors
      // process messages via queueMicrotask, so we need a few event loop ticks.
      await new Promise(r => setTimeout(r, 100));

      // ── Bootstrap discovery ──────────────────────────────────────
      group('Bootstrap discovery');

      const allIslands = document.querySelectorAll('[data-march-island]');
      assert(allIslands.length === 9, `Found ${allIslands.length} island elements (expected 9)`);

      assert(window.marchIslands != null, 'window.marchIslands is defined');
      assert(typeof window.marchIslands.send === 'function', 'window.marchIslands.send is a function');

      // ── Eager hydration ──────────────────────────────────────────
      group('Eager hydration');

      const counter = document.querySelector('[data-march-island="Counter"]');
      assert(counter._marchActor != null, 'Counter has a _marchActor');
      assertEqual(counter._marchActor.name, 'Counter', 'Actor name is Counter');

      // After __init__ message, the mock re-renders with count=0
      const countSpan = counter.querySelector('.count');
      assert(countSpan != null, 'Counter rendered .count span');
      assertEqual(countSpan.textContent, '0', 'Counter initial render shows 0');

      // ── State parsing ────────────────────────────────────────────
      group('State parsing');

      const escaped = document.querySelector('[data-march-island="Escaped"]');
      assert(escaped._marchActor != null, 'Escaped island hydrated');
      const nameSpan = escaped.querySelector('.name');
      assert(nameSpan != null, 'Escaped island rendered');
      assertEqual(nameSpan.textContent, "it's escaped", 'HTML entity &#39; decoded to single quote');

      const noState = document.querySelector('[data-march-island="NoState"]');
      assert(noState._marchActor != null, 'NoState island hydrated');
      const stateSpan = noState.querySelector('.state');
      assertEqual(stateSpan.textContent, '{}', 'Missing state defaults to {}');

      // ── Actor messaging / render cycle ───────────────────────────
      group('Actor messaging');

      counter._marchActor.send({ tag: 'Increment' });
      await new Promise(r => setTimeout(r, 50));

      const count1 = counter.querySelector('.count');
      assertEqual(count1.textContent, '1', 'Count incremented to 1 after send');

      counter._marchActor.send({ tag: 'Increment' });
      counter._marchActor.send({ tag: 'Increment' });
      await new Promise(r => setTimeout(r, 50));

      const count3 = counter.querySelector('.count');
      assertEqual(count3.textContent, '3', 'Count is 3 after two more increments');

      // ── Event binding: data-on-click ─────────────────────────────
      group('Event binding');

      const eventTest = document.querySelector('[data-march-island="EventTest"]');
      assert(eventTest._marchActor != null, 'EventTest island hydrated');

      const btn = eventTest.querySelector('[data-on-click]');
      assert(btn != null, 'Found button with data-on-click');
      btn.click();
      await new Promise(r => setTimeout(r, 50));

      const clickSpan = eventTest.querySelector('.clicks');
      assertEqual(clickSpan.textContent, '1', 'Click handler incremented counter');

      // ── Event binding: data-on-input ─────────────────────────────
      const input = eventTest.querySelector('[data-on-input]');
      assert(input != null, 'Found input with data-on-input');
      input.value = 'hello';
      input.dispatchEvent(new Event('input', { bubbles: true }));
      await new Promise(r => setTimeout(r, 50));

      // The update stored the value — we can verify through another render cycle
      // (the mock stores it in state.value)
      assert(true, 'Input event dispatched without error');

      // ── Event binding: data-on-submit ────────────────────────────
      const form = eventTest.querySelector('[data-on-submit]');
      assert(form != null, 'Found form with data-on-submit');
      // Dispatch submit event — check defaultPrevented after the event finishes
      const submitEvt = new Event('submit', { bubbles: true, cancelable: true });
      form.dispatchEvent(submitEvt);
      await new Promise(r => setTimeout(r, 50));
      assert(submitEvt.defaultPrevented, 'Submit event default was prevented');

      // ── Cross-island messaging ───────────────────────────────────
      group('Cross-island messaging');

      const sender = document.querySelector('[data-march-island="Sender"]');
      const receiver = document.querySelector('[data-march-island="Receiver"]');
      assert(sender._marchActor != null, 'Sender island hydrated');
      assert(receiver._marchActor != null, 'Receiver island hydrated');

      // Use the global send API
      window.marchIslands.send('Receiver', { tag: 'Ping' });
      await new Promise(r => setTimeout(r, 50));

      const recvSpan = receiver.querySelector('.received');
      assertEqual(recvSpan.textContent, 'pong', 'Receiver got Ping via cross-island send');

      // ── Lazy hydration ───────────────────────────────────────────
      group('Hydration strategies');

      const lazy = document.querySelector('[data-march-island="LazyWidget"]');
      assertEqual(lazy._marchActor, undefined, 'Lazy island NOT hydrated yet (off-screen)');

      // ── Interaction hydration ────────────────────────────────────
      const interactive = document.querySelector('[data-march-island="Interactive"]');
      assertEqual(interactive._marchActor, undefined, 'Interaction island NOT hydrated before click');

      // Simulate first interaction
      interactive.dispatchEvent(new PointerEvent('pointerdown', { bubbles: true }));
      await new Promise(r => setTimeout(r, 100));

      assert(interactive._marchActor != null, 'Interaction island hydrated after pointerdown');

      // ── Idle hydration ───────────────────────────────────────────
      const idle = document.querySelector('[data-march-island="IdleWorker"]');
      // requestIdleCallback fires when browser is idle — wait a bit
      await new Promise(r => setTimeout(r, 300));
      assert(idle._marchActor != null, 'Idle island hydrated after idle callback');

      // ── Re-render re-binds events ────────────────────────────────
      group('Re-render event rebinding');

      // The Counter was incremented to 3. Its innerHTML was replaced.
      // Verify the new button still has a working click handler.
      const btn2 = counter.querySelector('[data-on-click]');
      assert(btn2 != null, 'Counter has a click button after re-render');
      btn2.click();
      await new Promise(r => setTimeout(r, 50));

      const count4 = counter.querySelector('.count');
      assertEqual(count4.textContent, '4', 'Re-bound click handler works after re-render');

      // ── Done ─────────────────────────────────────────────────────
      renderResults();
    }

    runTests().catch(err => {
      document.getElementById('results').innerHTML =
        `<div class="fail">Test runner error: ${err.message}</div><pre class="fail">${err.stack}</pre>`;
    });
  </script>
</body>
</html>

name = "March"
grammar = "march"
path_suffixes = ["march"]
line_comments = ["-- "]
block_comment = ["{- ", " -}"]
tab_size = 2

brackets = [
  { start = "(", end = ")", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]

word_characters = ["_", "'"]
